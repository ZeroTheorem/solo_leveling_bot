name: Build & Deploy ARMv7 Bot

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add ARMv7 target
        run: rustup target add armv7-unknown-linux-gnueabihf

      - name: Install cross for cross-compilation
        run: cargo install cross

      - name: Build ARMv7 release binary
        run: cross build --release --target armv7-unknown-linux-gnueabihf

      - name: Upload binary artifact (optional)
        uses: actions/upload-artifact@v3
        with:
          name: armv7_gym_bot
          path: target/armv7-unknown-linux-gnueabihf/release/test_bot

      - name: Deploy to Raspberry Pi via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/projects/solo_leveling_bot
            # остановим текущий бот
            systemctl stop gym_bot || true
            # скопируем новый бинарник
            cp ${{ github.workspace }}/target/armv7-unknown-linux-gnueabihf/release/armv7_gym_bot ./solo_leveling_bot
            # перезапустим сервис
            systemctl start gym_bot
